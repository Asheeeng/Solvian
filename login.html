<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 · Solvian</title>
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">
  <div class="login-page">
    <section class="login-stage" aria-label="品牌展示区">
      <div class="login-stage__grid" aria-hidden="true"></div>
      <div class="login-stage__halo login-stage__halo--violet" aria-hidden="true"></div>
      <div class="login-stage__halo login-stage__halo--amber" aria-hidden="true"></div>

      <header class="login-stage__header">
        <div class="login-brand">
          <span class="logo-dot"></span>
          <span class="logo-txt">Solvian</span>
          <span class="logo-ver">v2</span>
        </div>
        <span class="role-tag">Secure Login</span>
      </header>

      <div class="login-stage__copy">
        <p class="login-stage__eyebrow">Explain Every Step</p>
        <h1 class="login-stage__title">进入智能作业诊断系统，从更安全也更有趣的登录开始。</h1>
        <p class="login-stage__description">
          角色会跟随鼠标、在输入密码时主动转头避开，并在显示密码时由紫色角色偷偷瞄一眼后马上装作没看见。
        </p>
      </div>

      <div class="login-scene-shell">
        <div class="login-scene" id="loginScene" aria-hidden="true">
          <div class="login-scene__orb login-scene__orb--one"></div>
          <div class="login-scene__orb login-scene__orb--two"></div>

          <div class="login-character login-character--violet" id="charViolet">
            <div class="login-character__body"></div>
            <div class="login-character__face" id="faceViolet">
              <div class="login-eyes">
                <span class="login-eye"><span class="login-pupil" id="pupilVioletL"></span></span>
                <span class="login-eye"><span class="login-pupil" id="pupilVioletR"></span></span>
              </div>
            </div>
          </div>

          <div class="login-character login-character--graphite" id="charGraphite">
            <div class="login-character__body"></div>
            <div class="login-character__face" id="faceGraphite">
              <div class="login-eyes">
                <span class="login-eye"><span class="login-pupil" id="pupilGraphiteL"></span></span>
                <span class="login-eye"><span class="login-pupil" id="pupilGraphiteR"></span></span>
              </div>
            </div>
          </div>

          <div class="login-character login-character--apricot" id="charApricot">
            <div class="login-character__body"></div>
            <div class="login-character__face" id="faceApricot">
              <div class="login-eyes">
                <span class="login-eye login-eye--dot"><span class="login-pupil" id="pupilApricotL"></span></span>
                <span class="login-eye login-eye--dot"><span class="login-pupil" id="pupilApricotR"></span></span>
              </div>
            </div>
          </div>

          <div class="login-character login-character--lemon" id="charLemon">
            <div class="login-character__body"></div>
            <div class="login-character__face" id="faceLemon">
              <div class="login-eyes">
                <span class="login-eye login-eye--dot"><span class="login-pupil" id="pupilLemonL"></span></span>
                <span class="login-eye login-eye--dot"><span class="login-pupil" id="pupilLemonR"></span></span>
              </div>
              <span class="login-mouth" id="mouthLemon"></span>
            </div>
          </div>
        </div>
      </div>

      <footer class="login-stage__footer">
        <button class="login-stage__link" type="button">隐私政策</button>
        <button class="login-stage__link" type="button">服务条款</button>
        <button class="login-stage__link" type="button">联系我们</button>
      </footer>
    </section>

    <section class="login-panel" aria-label="登录表单区">
      <div class="login-mobile-brand">
        <span class="logo-dot"></span>
        <span class="logo-txt">Solvian</span>
        <span class="logo-ver">v2</span>
      </div>

      <div class="login-card">
        <div class="ws-empty-badge">WELCOME BACK</div>
        <h2 class="login-card__title">登录你的 Solvian 账户</h2>
        <p class="login-card__description">登录成功后会直接进入 student-review 页面，继续使用作业诊断、错题本和统计面板。</p>

        <form id="loginForm" class="login-form">
          <div class="m-field">
            <label for="loginUser">用户名</label>
            <input id="loginUser" type="text" autocomplete="username" maxlength="40" placeholder="请输入用户名">
          </div>

          <div class="m-field">
            <label for="loginPass">密码</label>
            <div class="login-pass-wrap">
              <input id="loginPass" type="password" autocomplete="current-password" maxlength="40" placeholder="请输入密码">
              <button class="login-toggle" id="togglePassword" type="button" aria-label="显示密码" aria-pressed="false">👁</button>
            </div>
          </div>

          <div class="login-inline">
            <label class="login-check">
              <input id="rememberMe" type="checkbox" checked>
              <span>记住本次体验</span>
            </label>
            <button class="login-link" id="forgotBtn" type="button">忘记密码？</button>
          </div>

          <div class="login-message hidden" id="loginError" aria-live="polite"></div>
          <div class="login-message login-message--info hidden" id="loginInfo" aria-live="polite"></div>

          <button class="btn-primary login-submit" id="loginSubmit" type="submit">
            <span>登录进入作业诊断</span>
          </button>
        </form>

        <div class="d-card login-demo-card">
          <div class="d-card-h">
            <span>🚀 演示账号</span>
            <span class="d-tag">DEMO</span>
          </div>
          <div class="d-card-b">
            <div class="login-demo-row">
              <div class="login-demo-copy">
                <div class="login-demo-title">教师账号</div>
                <div class="login-demo-meta"><span class="login-demo-code">tea123 / 123456</span></div>
              </div>
              <button class="btn-flat" type="button" data-user="tea123" data-pass="123456">一键填入</button>
            </div>
            <div class="login-demo-row">
              <div class="login-demo-copy">
                <div class="login-demo-title">学生账号</div>
                <div class="login-demo-meta"><span class="login-demo-code">stu001 / 123456</span></div>
              </div>
              <button class="btn-flat" type="button" data-user="stu001" data-pass="123456">一键填入</button>
            </div>
          </div>
        </div>

        <p class="login-card__foot">智能作业诊断系统 · 深色体验已对齐现有 Solvian 主题</p>
      </div>
    </section>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
