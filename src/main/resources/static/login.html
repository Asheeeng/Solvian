<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - AI 数学逻辑诊断系统</title>
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body class="auth-page">
  <main class="auth-card">
    <h1>登录</h1>
    <p class="muted">请选择角色并登录系统</p>

    <form id="loginForm" class="form-stack">
      <label>
        用户名
        <input id="username" name="username" type="text" required maxlength="40" />
      </label>

      <label>
        密码
        <input id="password" name="password" type="password" required minlength="6" maxlength="40" />
      </label>

      <label>
        角色
        <select id="role" name="role" required>
          <option value="STUDENT">学生</option>
          <option value="TEACHER">老师</option>
          <option value="ADMIN">管理员</option>
        </select>
      </label>

      <button type="submit" class="primary-btn">登录</button>
    </form>

    <p id="loginError" class="error-text" aria-live="polite"></p>

    <p class="muted">
      没有账号？<a href="/register.html">去注册</a>
    </p>
  </main>

  <script type="module" src="/js/login.js"></script>
</body>
</html>
