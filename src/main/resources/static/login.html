<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>登录 - Solvian</title>
  <link rel="stylesheet" href="/css/app.css?v=20260414-loginfix" />
  <link rel="stylesheet" href="/css/auth.css?v=20260414-loginfix" />
</head>
<body class="auth-screen auth-screen--login" data-theme="light">
  <main class="auth-layout">
    <section class="auth-stage" aria-label="品牌展示区">
      <div class="auth-stage__noise" aria-hidden="true"></div>
      <div class="auth-stage__halo auth-stage__halo--violet" aria-hidden="true"></div>
      <div class="auth-stage__halo auth-stage__halo--amber" aria-hidden="true"></div>

      <header class="auth-stage__header">
        <div class="brand-lockup">
          <div class="brand-lockup__badge" aria-hidden="true">S</div>
          <div>
            <p class="brand-lockup__name">Solvian</p>
            <p class="brand-lockup__meta">AI 数学诊断系统</p>
          </div>
        </div>
      </header>

      <div class="auth-stage__copy">
        <p class="auth-stage__eyebrow">Explain every step</p>
        <h1 class="auth-stage__title">每一次登录，都是一次更清晰的推理入口。</h1>
        <p class="auth-stage__description">
          用更有温度的认证体验，把题目、过程和诊断反馈连接起来。角色、密码和权限逻辑都继续沿用现有系统。
        </p>
      </div>

      <div class="auth-scene-shell">
        <div class="auth-scene" id="authScene" aria-hidden="true">
          <span class="auth-scene__orb auth-scene__orb--one"></span>
          <span class="auth-scene__orb auth-scene__orb--two"></span>
          <span class="auth-scene__symbol auth-scene__symbol--sum">∑</span>
          <span class="auth-scene__symbol auth-scene__symbol--int">∫</span>
          <span class="auth-scene__symbol auth-scene__symbol--pi">π</span>
          <div class="auth-scene__track auth-scene__track--one"></div>
          <div class="auth-scene__track auth-scene__track--two"></div>
          <div class="auth-scene__ground"></div>

          <div class="auth-character auth-character--violet">
            <div class="auth-character__core">
              <div class="auth-character__body"></div>
              <div class="auth-character__face">
                <div class="auth-character__eyes">
                  <span class="auth-eye"><span class="auth-eye__pupil"></span></span>
                  <span class="auth-eye"><span class="auth-eye__pupil"></span></span>
                </div>
              </div>
              <div class="auth-character__back"></div>
            </div>
          </div>

          <div class="auth-character auth-character--graphite">
            <div class="auth-character__core">
              <div class="auth-character__body"></div>
              <div class="auth-character__face">
                <div class="auth-character__eyes">
                  <span class="auth-eye"><span class="auth-eye__pupil"></span></span>
                  <span class="auth-eye"><span class="auth-eye__pupil"></span></span>
                </div>
              </div>
              <div class="auth-character__back"></div>
            </div>
          </div>

          <div class="auth-character auth-character--lemon">
            <div class="auth-character__core">
              <div class="auth-character__body"></div>
              <div class="auth-character__face">
                <div class="auth-character__eyes">
                  <span class="auth-eye"><span class="auth-eye__pupil"></span></span>
                  <span class="auth-eye"><span class="auth-eye__pupil"></span></span>
                </div>
                <span class="auth-character__mouth"></span>
              </div>
              <div class="auth-character__back"></div>
            </div>
          </div>

          <div class="auth-character auth-character--apricot">
            <div class="auth-character__core">
              <div class="auth-character__body"></div>
              <div class="auth-character__face">
                <div class="auth-character__eyes">
                  <span class="auth-eye"><span class="auth-eye__pupil"></span></span>
                  <span class="auth-eye"><span class="auth-eye__pupil"></span></span>
                </div>
              </div>
              <div class="auth-character__back"></div>
            </div>
          </div>
        </div>
      </div>

      <footer class="auth-stage__footer">
        <button type="button" class="auth-stage__link">隐私说明</button>
        <button type="button" class="auth-stage__link">服务条款</button>
        <button type="button" class="auth-stage__link">联系我们</button>
      </footer>
    </section>

    <section class="auth-panel" aria-label="登录表单区">
      <button type="button" class="theme-toggle" id="themeToggle" aria-pressed="false">
        <span class="theme-toggle__glyph theme-toggle__glyph--sun" aria-hidden="true">☀</span>
        <span class="theme-toggle__glyph theme-toggle__glyph--moon" aria-hidden="true">☾</span>
        <span class="theme-toggle__label" data-theme-label>深色模式</span>
      </button>

      <div class="auth-panel__inner">
        <p class="auth-panel__eyebrow">Welcome back</p>
        <h2 class="auth-panel__title">登录你的 Solvian 账户</h2>
        <p class="auth-panel__description">
          继续使用现有账号、密码和角色进入系统。接口、登录态写入和跳转逻辑全部保持不变。
        </p>

        <form id="loginForm" class="auth-form">
          <div class="auth-field-group">
            <label class="auth-field-label" for="username">账号</label>
            <div class="auth-field-shell">
              <input
                id="username"
                name="username"
                type="text"
                required
                maxlength="40"
                autocomplete="username"
                placeholder="请输入用户名"
              />
            </div>
          </div>

          <div class="auth-field-group">
            <div class="auth-field-head">
              <label class="auth-field-label" for="password">密码</label>
              <button type="button" class="auth-inline-link" id="forgotPasswordBtn">忘记密码？</button>
            </div>
            <div class="auth-field-shell auth-field-shell--password">
              <input
                id="password"
                name="password"
                type="password"
                required
                minlength="6"
                maxlength="40"
                autocomplete="current-password"
                placeholder="请输入密码"
              />
              <button
                type="button"
                id="passwordToggle"
                class="password-toggle"
                aria-label="显示密码"
                aria-pressed="false"
              >
                <span class="password-toggle__icon password-toggle__icon--show" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 12s3.6-6 10-6 10 6 10 6-3.6 6-10 6-10-6-10-6Z"></path>
                    <circle cx="12" cy="12" r="3"></circle>
                  </svg>
                </span>
                <span class="password-toggle__icon password-toggle__icon--hide" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 3l18 18"></path>
                    <path d="M10.6 10.7A3 3 0 0 0 13.4 13.5"></path>
                    <path d="M9.9 5.1A11.4 11.4 0 0 1 12 5c6.4 0 10 7 10 7a18.5 18.5 0 0 1-4 4.9"></path>
                    <path d="M6.6 6.7A18.7 18.7 0 0 0 2 12s3.6 7 10 7a10.6 10.6 0 0 0 4.4-.9"></path>
                  </svg>
                </span>
              </button>
            </div>
          </div>

          <div class="auth-field-group">
            <div class="auth-field-head">
              <span class="auth-field-label">登录身份</span>
              <span class="auth-field-tip">继续沿用现有角色语义</span>
            </div>
            <input id="role" name="role" type="hidden" value="STUDENT" />
            <div class="auth-role-switch" role="radiogroup" aria-label="登录身份">
              <button type="button" class="auth-role-chip is-active" role="radio" aria-checked="true" data-role="STUDENT">
                <span class="auth-role-chip__title">学生</span>
                <span class="auth-role-chip__meta">上传题目并查看诊断结果</span>
              </button>
              <button type="button" class="auth-role-chip" role="radio" aria-checked="false" data-role="TEACHER">
                <span class="auth-role-chip__title">老师</span>
                <span class="auth-role-chip__meta">跟踪课堂反馈与作答表现</span>
              </button>
              <button type="button" class="auth-role-chip" role="radio" aria-checked="false" data-role="ADMIN">
                <span class="auth-role-chip__title">管理员</span>
                <span class="auth-role-chip__meta">管理系统与全局角色配置</span>
              </button>
            </div>
          </div>

          <div class="auth-field-group">
            <div class="auth-field-head">
              <label class="auth-field-label" for="loginCaptchaInput">图形验证码</label>
              <span class="auth-field-tip">前端可用版，支持刷新</span>
            </div>
            <div class="captcha-row">
              <div class="auth-field-shell captcha-input-shell">
                <input
                  id="loginCaptchaInput"
                  name="captcha"
                  type="text"
                  inputmode="text"
                  maxlength="4"
                  autocomplete="off"
                  placeholder="请输入验证码"
                />
              </div>
              <div class="captcha-card">
                <canvas id="loginCaptchaCanvas" width="144" height="56" aria-hidden="true"></canvas>
                <button type="button" class="captcha-refresh" id="loginCaptchaRefresh">换一张</button>
              </div>
            </div>
          </div>

          <p id="loginError" class="auth-message auth-message--error" aria-live="polite"></p>
          <p id="loginNotice" class="auth-message auth-message--notice" aria-live="polite"></p>

          <button type="submit" class="auth-submit-btn" id="loginSubmit">登录</button>

          <button type="button" class="auth-secondary-btn" id="thirdPartyLoginBtn">
            <span class="auth-secondary-btn__badge" aria-hidden="true">企</span>
            企业微信登录（暂未开放）
          </button>
        </form>

        <p class="auth-switch">
          没有账号？<a href="/register.html">立即创建</a>
        </p>
      </div>
    </section>
  </main>

  <script type="module" src="/js/login.js?v=20260414-loginfix"></script>
</body>
</html>
