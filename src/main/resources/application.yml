server:
  # 服务端口
  port: 8080

spring:
  application:
    # 应用名称
    name: springboot-base
  profiles:
    # 默认启用 local，自动读取 application-local.yml（可被环境变量覆盖）
    active: ${SPRING_PROFILES_ACTIVE:local}

  datasource:
    # PostgreSQL 数据库连接配置
    url: jdbc:postgresql://localhost:5432/your_database
    username: your_username
    password: your_password
    driver-class-name: org.postgresql.Driver

  servlet:
    multipart:
      # 单个文件上传大小限制
      max-file-size: 20MB
      # 单次请求总上传大小限制
      max-request-size: 50MB

# 业务自定义配置：跨域
app:
  cors:
    # 允许跨域来源
    allowed-origins:
      - http://localhost:3000
      - http://127.0.0.1:3000
    # 允许的 HTTP 方法
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    # 是否允许携带 Cookie
    allow-credentials: true
    # 预检请求缓存时间（秒）
    max-age: 3600
  ai:
    # 是否启用真实模型调用
    enabled: true
    # 模型提供商标识（当前设计围绕智谱）
    provider: zhipu
    # 推理模型（第二阶段）：GLM-4.7
    model: glm-4.7
    # 视觉模型（第一阶段）
    vision-model: glm-4.6v
    # API Key 预留：默认空，由环境变量 AI_MODEL_API_KEY 或本地 profile 填写
    api-key: ${AI_MODEL_API_KEY:}
    # Base URL 预留：默认智谱开放平台（完整地址）
    base-url: ${AI_MODEL_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
    # 调试开关：true 时可强制走 mock；排查真实链路时请设为 false
    mock-enabled: false
    # 当前阶段关闭自动回退，优先暴露真实错误
    fallback-to-mock: false
    # 网络超时（毫秒）
    timeout-ms: 120000
    # 视觉阶段返回上限
    vision-max-tokens: 1400
    # 推理阶段返回上限
    reasoning-max-tokens: 2600
    # 上传图片进入模型前的最大边长
    image-max-width: 1024
    # 异步诊断 worker 并发数
    task-worker-threads: 2
    # 诊断任务文件暂存目录，留空时使用系统临时目录
    task-storage-dir: ""

mybatis-plus:
  # Mapper XML 位置（当前项目为占位结构，可先保留默认路径）
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    # 下划线转驼峰
    map-underscore-to-camel-case: true
    # 打印 SQL 到控制台（开发阶段可观察）
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      # 默认主键类型（ASSIGN_ID：雪花算法）
      id-type: ASSIGN_ID
